version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: telegram_warehouse_db
    environment:
      POSTGRES_DB: ${DB_NAME:-telegram_warehouse}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - warehouse_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: telegram_warehouse_app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-telegram_warehouse}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_PHONE: ${TELEGRAM_PHONE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - warehouse_network
    volumes:
      - .:/app
    command: /bin/bash

volumes:
  postgres_data:

networks:
  warehouse_network:
    driver: bridge
